name: Deploy Scraper to Prefect

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt prefect
      
      - name: Deploy flow to Prefect
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL: https://api.prefect.cloud/api/accounts/7bf03eae-7571-4c5b-b06e-731f965b49e1/workspaces/36d5681a-f9dd-4a37-bc4d-9590f0adc22e
        run: |
          prefect deploy workflow.py:print_events \
            -n "Scraper Deployment" \
            --cron "*/2 * * * *" \
            --pool "default"

      - name: Trigger deployment immediately
        run: prefect deployment run "print_events/Scraper Deployment"
