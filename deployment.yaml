version: 1
deployments:
  - name: scraper
    entrypoint: workflow.py:print_events
    work_pool:
      name: default
      job_variables:
        image: prefecthq/prefect:3-python3.10
        command: bash -c "pip install git+https://github.com/Chaimaekit/Events_Project.git && python -m prefect.engine"
    schedules:
      - cron: "*/2 * * * *"
        timezone: UTC
